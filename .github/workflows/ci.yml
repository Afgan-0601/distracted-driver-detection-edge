name: CI — Tests & Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CPU-only dependencies
        run: |
          pip install --upgrade pip
          # Install torch CPU-only (faster CI, no GPU needed for unit tests)
          pip install torch==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cpu
          pip install fastapi uvicorn[standard] python-multipart pydantic>=2.6.0
          pip install onnx onnxruntime pillow numpy pytest pytest-asyncio httpx

      - name: Run risk calculator tests (no dataset needed)
        run: pytest tests/test_risk_calculator.py -v

      - name: Run model architecture tests (no dataset needed)
        run: pytest tests/test_model.py -v

      - name: Verify API can import cleanly
        run: python -c "from api.main import app; print('API import OK')"
