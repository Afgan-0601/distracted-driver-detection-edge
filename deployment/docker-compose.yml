version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: distracted-driver-api:latest
    container_name: driver_detection_api
    ports:
      - "8000:8000"
    volumes:
      # Mount trained model weights without rebuilding the image
      - ./models/weights:/app/models/weights:ro
    environment:
      - CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
